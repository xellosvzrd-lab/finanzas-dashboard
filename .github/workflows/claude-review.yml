name: Claude PR Review
on: [pull_request]
permissions:
  contents: read
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Instalar Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Generar diff del PR
        run: git diff origin/main...HEAD > /tmp/pr.diff
      - run: |
          claude -p "Review the PR diff at /tmp/pr.diff for: 1) UI elements placed on inaccessible pages, 2) uncommitted assumptions, 3) mobile overflow issues." --allowedTools "Read,Grep,Glob"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
